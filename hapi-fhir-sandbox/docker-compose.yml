services:
  hapi-fhir:
    image: hapiproject/hapi:latest
    container_name: hapi-fhir
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:h2:mem:hapi;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE"
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: ""
      SPRING_DATASOURCE_DRIVERCLASSNAME: org.h2.Driver
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: ca.uhn.fhir.jpa.model.dialect.HapiFhirH2Dialect
      HAPI_FHIR_FHIR_VERSION: R4
      HAPI_FHIR_ALLOW_MULTIPLE_DELETE: "true"

  fhir-loader:
    image: curlimages/curl:latest
    container_name: fhir-loader
    entrypoint: /bin/sh
    command: /loader/load-data.sh
    depends_on:
      - hapi-fhir
    volumes:
      - ./loader:/loader:ro
      - ./data:/data:ro
    environment:
      FHIR_BASE_URL: "http://hapi-fhir:8080/fhir"
    restart: "no"

  cos-extractor:
    build:
      context: ./extractor
    container_name: cos-extractor
    profiles:
      - extract
    env_file:
      - ./extractor/.env
    environment:
      EXTRACT_OUTPUT_DIR: /data
    volumes:
      - ./data:/data
    restart: "no"

  fhir-client:
    image: nginx:alpine
    container_name: fhir-client
    ports:
      - "3000:80"
    volumes:
      - ./client/index.html:/usr/share/nginx/html/index.html:ro
      - ./client/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - hapi-fhir
